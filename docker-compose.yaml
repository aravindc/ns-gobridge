services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d health"]
      interval: 5s
      timeout: 5s
      retries: 10

  ns-gobridge:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.ns-gobridge
    volumes:
      # Optionally set UNITS (mg/dl or mmol; ?units= on any request overrides
      # this) and API_KEY (requires an X-API-Key header on /api/* except
      # /api/health; strongly recommended once reachable by anything other
      # than localhost) in .env.development alongside the Dexcom config.
      - ./.env.development:/app/.env.development:ro
    expose:
      - "8080"

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - ns-gobridge
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
