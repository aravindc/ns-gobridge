services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: health
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d health"]
      interval: 5s
      timeout: 5s
      retries: 10

  ns-gobridge:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NS_ENV: development
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_SSLMODE: disable
      # UNITS: mg/dl or mmol (default mg/dl); ?units= on any request overrides this.
      # API_KEY: set this to require an X-API-Key header on /api/* (except /api/health).
      # Strongly recommended once this is reachable by anything other than localhost.
    volumes:
      - ./.env.development:/app/.env.development:ro
    ports:
      - "8080:8080"

volumes:
  pgdata:
